<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YunNi Nail Studio 價目計算機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f2ede4; /* 接近圖片的米色底 */
            color: #6d594f;
        }
        .card {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(109, 89, 79, 0.1);
            border: 1px solid #d5bdaf;
        }
        .category-title {
            color: #8d7b68;
            font-weight: 700;
            border-bottom: 1px solid #d5bdaf;
            padding-bottom: 4px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }
        .category-en {
            font-size: 0.7rem;
            font-weight: 400;
            opacity: 0.8;
            letter-spacing: 0.5px;
        }
        .checkbox-custom {
            accent-color: #a98467;
            width: 1.1rem;
            height: 1.1rem;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            cursor: pointer;
        }
        .price-tag {
            font-weight: 500;
            color: #8d7b68;
        }
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #d5bdaf, transparent);
            margin: 15px 0;
        }
        input[type="number"] {
            border: 1px solid #d5bdaf;
            border-radius: 4px;
            padding: 2px 5px;
            width: 70px;
            text-align: right;
            background: #faf9f6;
        }
    </style>
</head>
<body class="p-4 min-h-screen flex items-start justify-center">

    <div class="max-w-md w-full card p-6 mt-4">
        <!-- Logo Area -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold tracking-widest text-[#8d7b68]">YunNi Nail Studio</h1>
            <p class="text-xs tracking-[0.3em] opacity-70 mt-1">· 雲霓美甲 ·</p>
        </div>

        <div class="space-y-8">
            <!-- 純色系列 -->
            <section>
                <h2 class="category-title">
                    <span>純色系列</span>
                    <span class="category-en">Solid Color Series</span>
                </h2>
                <div class="space-y-1 text-sm">
                    <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-2" data-price="1500"> 極致純色</span><span class="price-tag">1500</span></label>
                    <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-2" data-price="1200"> 沙龍純色</span><span class="price-tag">1200</span></label>
                    <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-2" data-price="1200"> 碎鑽膠</span><span class="price-tag">1200</span></label>
                    <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-2" data-price="1200"> 閃閃貓眼膠</span><span class="price-tag">1200</span></label>
                    <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-2" data-price="1500"> 魔鏡粉單色</span><span class="price-tag">1500</span></label>
                </div>
            </section>

            <!-- 精緻美甲系列 -->
            <section>
                <h2 class="category-title">
                    <span>精緻美甲系列</span>
                    <span class="category-en">Exquisite Nail Art Design Series</span>
                </h2>
                <div class="space-y-1 text-sm">
                    <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-2" data-price="1800"> 法式</span><span class="price-tag">1800</span></label>
                    <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-2" data-price="1800"> 漸層</span><span class="price-tag">1800</span></label>
                    <div class="item-row">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" class="checkbox-custom mr-2" id="customCheck"> 個人訂製款
                        </label>
                        <div class="flex items-center">
                            <span class="text-xs mr-1">NT$</span>
                            <input type="number" id="customInput" value="1800">
                        </div>
                    </div>
                </div>
            </section>

            <!-- 甲膜裸透色 (移動到精緻美甲後) -->
            <section>
                <label class="item-row font-medium text-[#8d7b68] bg-[#faf9f6] p-3 rounded border border-dashed border-[#d5bdaf]">
                    <span class="flex flex-col">
                        <span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-2" data-price="1500"> 甲膜裸透色延長單色</span>
                        <span class="text-[10px] ml-6 opacity-60">Nail film nude sheer color extension</span>
                    </span>
                    <span class="price-tag">1500</span>
                </label>
            </section>

            <!-- 延長系列 -->
            <section>
                <h2 class="category-title">
                    <span>延長系列</span>
                    <span class="category-en">Nail Extensions Series</span>
                </h2>
                <div class="space-y-1 text-sm">
                    <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-2" data-price="1500"> 淺貼延長</span><span class="price-tag">1500</span></label>
                    <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-2" data-price="1000"> 半貼延長</span><span class="price-tag">1000</span></label>
                </div>
            </section>

            <!-- 基礎護理系列 -->
            <section>
                <h2 class="category-title">
                    <span>基礎護理系列</span>
                    <span class="category-en">Basic Nursing Series</span>
                </h2>
                <div class="grid grid-cols-2 gap-x-6 gap-y-4 text-xs mb-4">
                    <div class="space-y-1">
                        <p class="font-bold border-l-2 border-[#a98467] pl-1 mb-1">基本</p>
                        <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-1" data-price="500"> 手部</span><span class="price-tag">500</span></label>
                        <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-1" data-price="1000"> 足部</span><span class="price-tag">1000</span></label>
                    </div>
                    <div class="space-y-1">
                        <p class="font-bold border-l-2 border-[#a98467] pl-1 mb-1">微保養</p>
                        <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-1" data-price="700"> 手部</span><span class="price-tag">700</span></label>
                        <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-1" data-price="1300"> 足部</span><span class="price-tag">1300</span></label>
                    </div>
                </div>

                <!-- 護理細項 -->
                <div class="space-y-1 text-sm pt-2">
                    <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-2" data-price="500"> 足底硬繭處理</span><span class="price-tag">500</span></label>
                    <div class="bg-[#faf9f6] p-2 rounded">
                        <!-- 移除勾選框與價格，改為純文字標籤 -->
                        <p class="font-medium text-[#8d7b68] py-1 border-b border-[#d5bdaf] mb-2">凍甲 & 捲甲矯正</p>
                        <div class="pl-2 space-y-1 mt-1 opacity-80 text-xs">
                            <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-2" data-price="400"> 大拇指</span><span class="price-tag">400</span></label>
                            <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-2" data-price="200"> 其他指</span><span class="price-tag">200</span></label>
                        </div>
                    </div>
                </div>

                <!-- 卸甲修補項目 -->
                <div class="mt-4 space-y-1 text-sm">
                    <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-2" data-price="500"> 純卸甲</span><span class="price-tag">500</span></label>
                    <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-2" data-price="150"> 本甲修補 (1指)</span><span class="price-tag">150</span></label>
                    <label class="item-row"><span class="flex items-center"><input type="checkbox" class="checkbox-custom mr-2" data-price="300"> 卸甲續作</span><span class="price-tag">300</span></label>
                </div>
            </section>
        </div>

        <!-- 總計區 -->
        <div class="mt-10 pt-6 border-t border-[#d5bdaf] text-center">
            <p class="text-sm opacity-70 mb-1">估計總計金額</p>
            <p class="text-4xl font-bold text-[#8d7b68]">NT$ <span id="totalDisplay">0</span></p>
            <button id="resetBtn" class="mt-6 w-full py-3 bg-[#8d7b68] text-white rounded-lg font-medium hover:bg-[#6d594f] transition-all">重新清空</button>
            <div class="mt-6 text-[10px] opacity-50 space-y-1">
                <p>LINE: @mxv2481p | IG: yunninail</p>
                <p>© YunNi Nail Studio</p>
            </div>
        </div>
    </div>

    <script>
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const customCheck = document.getElementById('customCheck');
        const customInput = document.getElementById('customInput');
        const totalDisplay = document.getElementById('totalDisplay');
        const resetBtn = document.getElementById('resetBtn');

        function update() {
            let total = 0;
            checkboxes.forEach(cb => {
                if (cb.checked && cb.dataset.price) {
                    total += parseInt(cb.dataset.price);
                }
            });
            if (customCheck.checked) {
                total += (parseInt(customInput.value) || 0);
            }
            totalDisplay.innerText = total.toLocaleString();
        }

        checkboxes.forEach(cb => cb.addEventListener('change', update));
        customInput.addEventListener('input', update);
        resetBtn.addEventListener('click', () => {
            checkboxes.forEach(cb => cb.checked = false);
            customInput.value = 1800;
            update();
        });

        update();
    </script>
</body>
</html>
